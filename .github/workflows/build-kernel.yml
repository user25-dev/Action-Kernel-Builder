name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Device codename"
        required: true
        default: "earth"
      kernel_source:
        description: "Kernel source repository URL"
        required: true
        default: "https://github.com/user25-dev/android_kernel_xiaomi_earth.git"
      kernel_source_branch:
        description: "Kernel source branch"
        required: true
        default: "lineage-23.2"
      kernel_defconfig:
        description: "Kernel defconfig name"
        required: true
        default: "earth_defconfig"
      target_arch:
        description: "Target architecture"
        required: true
        default: "arm64"
      kernel_file:
        description: "Kernel output file name"
        required: true
        default: "Image.gz-dtb"
      kernel_name:
        description: "Kernel name"
        required: true
        default: "Kernel"
      make_boot_image:
        description: "Build boot image (true/false)"
        required: false
        default: "false"
      source_boot_image:
        description: "Source boot image URL"
        required: false
        default: "https://mirrorbits.lineageos.org/full/earth/20260215/boot.img"

permissions:
  contents: write

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ github.event.inputs.device }}
      KERNEL_SOURCE: ${{ github.event.inputs.kernel_source }}
      KERNEL_SOURCE_BRANCH: ${{ github.event.inputs.kernel_source_branch }}
      KERNEL_DEFCONFIG: ${{ github.event.inputs.kernel_defconfig }}
      TARGET_ARCH: ${{ github.event.inputs.target_arch }}
      KERNEL_FILE: ${{ github.event.inputs.kernel_file }}
      KERNEL_NAME: ${{ github.event.inputs.kernel_name }}
      MAKE_BOOT_IMAGE: ${{ github.event.inputs.make_boot_image }}
      SOURCE_BOOT_IMAGE: ${{ github.event.inputs.source_boot_image }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup build kernel environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libwxgtk3.2-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        export TZ="Asia/Kolkata"
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang Toolchain
      run: |
        wget -nv -O clang.tar.gz https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz
        mkdir clang
        tar -C clang/ -zxvf clang.tar.gz
        rm clang.tar.gz

    - name: Download GCC Toolchain
      run: |
        mkdir gcc-aosp
        wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/606f80986096476912e04e5c2913685a8f2c3b65.tar.gz
        tar -C gcc-aosp/ -zxvf 606f80986096476912e04e5c2913685a8f2c3b65.tar.gz

    - name: Download mkbootimg tools
      if: env.MAKE_BOOT_IMAGE == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://android.googlesource.com/platform/system/tools/mkbootimg tools -b master-kernel-build-2022 --depth=1

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1 --recurse-submodules --shallow-submodules

    - name: Download source boot image
      if: env.MAKE_BOOT_IMAGE == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O boot-source.img ${{ env.SOURCE_BOOT_IMAGE }}
        if [ -f boot-source.img ]; then
            echo "FORMAT_MKBOOTING=$(echo `tools/unpack_bootimg.py --boot_img=boot-source.img --format mkbootimg`)" >> $GITHUB_ENV
            echo "HAVE_SOURCE_BOOT_IMAGE=true" >> $GITHUB_ENV
        else
            echo "Source boot image is empty"
        fi

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export ARCH=${{ env.TARGET_ARCH }}
        export SUBARCH=${{ env.TARGET_ARCH }}
        export KBUILD_COMPILER_STRING="$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')"
        export KBUILD_BUILD_HOST=GitHub-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        make -j$(nproc --all) O=out ARCH=arm64 ${{ env.KERNEL_DEFCONFIG }}
        make -j$(nproc --all) ARCH=arm64 O=out \
                              HOSTCC="ccache clang" \
                              HOSTCXX="ccache clang++" \
                              CC="ccache clang" \
                              LD=ld.lld \
                              AR=llvm-ar \
                              NM=llvm-nm \
                              OBJCOPY=llvm-objcopy \
                              OBJDUMP=llvm-objdump \
                              READELF=llvm-readelf \
                              OBJSIZE=llvm-size \
                              STRIP=llvm-strip \
                              CROSS_COMPILE=aarch64-linux-gnu- \
                              CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Check a kernel output files
      run: |
       cd $GITHUB_WORKSPACE/kernel_workspace
       if [ -f android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }} ]; then
           echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
       else
           echo "Kernel output file is empty"
       fi
       if [ -f android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/dtbo.img ]; then
           echo "CHECK_DTBO_IS_OK=true" >> $GITHUB_ENV
       else
           echo "DTBO image is empty"
       fi

    - name: Make Anykernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/user25-dev/AnyKernel3.git
        if [ ${{ env.CHECK_FILE_IS_OK }} = true ]; then
            cp android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }} AnyKernel3/
        elif [ ${{ env.CHECK_DTBO_IS_OK }} = true ]; then
            cp android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/dtbo.img AnyKernel3/
        fi
        rm -rf AnyKernel3/.git* AnyKernel3/README.md
        zip -r0 ${{ env.KERNEL_NAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}.zip AnyKernel3/*

    - name: Make boot image
      if: env.HAVE_SOURCE_BOOT_IMAGE == 'true' && env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        tools/unpack_bootimg.py --boot_img boot-source.img
        cp android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }} out/kernel
        tools/mkbootimg.py ${{ env.FORMAT_MKBOOTING }} -o boot.img
        if [ -f boot.img ]; then
            echo "MAKE_BOOT_IMAGE_IS_OK=true" >> $GITHUB_ENV
        else
            echo "Boot image is empty"
        fi

    - name: Create Release
      if: env.CHECK_FILE_IS_OK == 'true'
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_TIME }}
        name: ${{ env.KERNEL_NAME }}-Build-${{ env.BUILD_TIME }}
        body: |
          Automated kernel build for ${{ env.DEVICE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Kernel
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_TIME }}
        files: kernel_workspace/android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/${{ env.KERNEL_FILE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_TIME }}
        files: kernel_workspace/${{ env.KERNEL_NAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload DTBO
      if: env.CHECK_DTBO_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_TIME }}
        files: kernel_workspace/android-kernel/out/arch/${{ env.TARGET_ARCH }}/boot/dtbo.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Boot Image
      if: env.MAKE_BOOT_IMAGE_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_TIME }}
        files: kernel_workspace/boot.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
